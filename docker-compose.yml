version: "3.9"

services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: "1234"
      POSTGRES_DB: library
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: node_backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DB_HOST=db  
      - DB_NAME=library
      - DB_PASS=1234
      - DB_USER=root
      - DB_DIALECT=postgres
      - JWT_SECRET=abc123
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: react_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata: